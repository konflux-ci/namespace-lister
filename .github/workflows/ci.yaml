name: Lint checks

on: # yamllint disable-line rule:truthy
  pull_request: {}
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-24.04
    permissions:
      id-token: write

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Determine Go version
        id: go_version
        run: |
          echo "version=$(go mod edit -json | jq -r '.Go')" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Run tests with coverage
        env:
          GINKGO: go run github.com/onsi/ginkgo/v2/ginkgo
          GINKGO_ARGS: --race --github-output --cover --coverprofile=coverage.out --output-dir=.
        run: make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          flags: unit-tests
          files: coverage.out
          fail_ci_if_error: false

  performance-tests:
    name: Run performance tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Determine Go version
        id: go_version
        run: |
          echo "version=$(go mod edit -json | jq -r '.Go')" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - uses: kubernetes-sigs/kwok@main
        with:
          command: 'kwokctl'

      - name: Set up kwokctl
        uses: kubernetes-sigs/kwok@main
        with:
          command: kwokctl

      - name: Run performance tests
        run: |
          GINKGO="go run github.com/onsi/ginkgo/v2/ginkgo --github-output" make test-perf

  acceptance:
    name: Run acceptance tests
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxy: dumb-proxy
          - proxy: smart-proxy

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Determine Go version
        id: go_version
        run: |
          echo "version=$(go mod edit -json | jq -r '.Go')" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Run tests
        env:
          KIND_EXPERIMENTAL_PROVIDER: podman
          IMAGE_BUILDER: podman
          IMG: konflux-ci.dev/namespace-lister:pr-${{ github.event.pull_request.number }}
          ENABLE_COVERAGE: "true"
        run: |
          echo "##[group] Preparing environment"
            make -C "acceptance/test/${{ matrix.proxy }}" prepare
          echo "##[endgroup]"
          echo "##[group] Running tests"
            make -C "acceptance/test/${{ matrix.proxy }}" test
          echo "##[endgroup]"

      - name: Collect e2e coverage
        id: collect_e2e_coverage
        if: always()
        continue-on-error: true
        run: |
          mkdir -p coverage-output && chmod 777 coverage-output
          cp "acceptance/test/${{ matrix.proxy }}/out/namespace-lister-admin.kcfg" /tmp/kubeconfig && chmod 644 /tmp/kubeconfig
          podman run --rm \
            --network host \
            -v /tmp/kubeconfig:/kubeconfig:ro \
            -v $PWD/coverage-output:/workspace/coverage-output \
            -e KUBECONFIG=/kubeconfig \
            quay.io/konflux-ci/konflux-devprod/coverport-cli@sha256:44c180e1e3a3521b1057f4e85723efef2eb2107a153c9c5e91dfdb0f5631e41d \
            collect \
              --namespace=namespace-lister \
              --label-selector=apps=namespace-lister \
              --test-name=e2e-tests \
              --output=/workspace/coverage-output

      - name: Upload e2e coverage to Codecov
        if: steps.collect_e2e_coverage.outcome == 'success'
        id: upload_e2e_coverage
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          flags: e2e-tests
          directory: coverage-output
          fail_ci_if_error: false


  go-tidy:
    name: Tidy go mod
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Ensure go.mod is tidy
        env:
          SHA_FILE: ${{ runner.temp }}/go_mod_shas.txt"
        run: |
          # generate sha512 for go mod files
          sha512sum go.mod go.sum > "${SHA_FILE}"

          # run go mod tidy
          go mod tidy -v

          # check files were left untouched
          sha512sum -c "${SHA_FILE}"
          if [ "$?" != 0 ]; then
            printf "please run go mod tidy to tidy the go.mod\n\n%s\n" "${output}"
            exit 1
          fi

  lint-go:
    name: Lint code
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Determine golang-ci version
        id: golangci_version
        run: |
          echo "version=$(grep 'GOLANGCI_LINT_VERSION ?=' Makefile | sed -e 's:GOLANGCI_LINT_VERSION ?= \(.*\):\1:' -)" \
            >> $GITHUB_OUTPUT

      - name: Lint with golang-ci
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci_version.outputs.version }}
          args: --timeout=5m

  lint-yaml:
    name: Lint yaml manifests
    runs-on: ubuntu-24.04

    steps:
      - name: Install yamllint
        run: |
          pip install yamllint

      - name: Checkout Git Repository
        uses: actions/checkout@v6

      - name: Lint with yamllint
        run: make lint-yaml
